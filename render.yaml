# Render detecta este arquivo automaticamente.
# Recomendado: Static Site (nao use o Dockerfile de dev no painel).

services:
  - type: web
    name: grimcodex
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://grimcodex-api.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://grimcodex-api.onrender.com
