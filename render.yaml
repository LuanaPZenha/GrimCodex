# Grim Codex — monorepo completo (padrao VTM / Vet Plus+)

databases:
  - name: grimcodex-db
    databaseName: grimcodex_db
    plan: free

services:
  - type: web
    name: grimcodex-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/db/migrate.js && node src/server.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: grimcodex-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: CORS_ORIGIN
        value: https://grimcodex.onrender.com
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        value: Admin1234

  - type: web
    name: grimcodex
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://grimcodex-api.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://grimcodex-api.onrender.com
