# Render — Frontend Grim Codex
# Deploy: New > Blueprint > conecte este repositorio
#
# IMPORTANTE: use runtime static (recomendado) ou Docker com Dockerfile.prod.
# Nao use o Dockerfile de desenvolvimento no Render.

services:
  - type: web
    name: grimcodex
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://grimcodex-api.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://grimcodex-api.onrender.com

  # Alternativa Docker (nginx + build Vite)
