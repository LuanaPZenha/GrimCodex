# Grim Codex — monorepo (frontend + backend + Postgres)
# Deploy: Render Dashboard > New > Blueprint > repo GrimCodex
#
# Se o frontend ja existir sozinho, crie manualmente:
#   - Postgres (grimcodex-postgres)
#   - Web Service Docker: nome grimcodex-api, rootDir backend

databases:
  - name: grimcodex-postgres
    databaseName: grimcodex
    user: grimcodex
    plan: free

services:
  - type: web
    name: grimcodex-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: grimcodex-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: CORS_ORIGIN
        value: https://grimcodex.onrender.com
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: grimcodex
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://grimcodex-api.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://grimcodex-api.onrender.com
