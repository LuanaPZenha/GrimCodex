# Grim Codex — API + PostgreSQL (deploy separado do frontend)
# Render Dashboard > New > Blueprint > repo GrimCodex > selecione este arquivo

databases:
  - name: grimcodex-postgres
    databaseName: grimcodex
    user: grimcodex
    plan: free
    ipAllowList: []

services:
  - type: web
    name: grimcodex-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: grimcodex-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: CORS_ORIGIN
        value: https://grimcodex.onrender.com
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        value: Admin1234
